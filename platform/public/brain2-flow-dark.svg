<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1240 660" width="1240" height="660" font-family="Helvetica Neue, Helvetica, Arial, sans-serif">

  <defs>
    <!-- soft shadow for tiles + brain -->
    <filter id="softShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="12" stdDeviation="13" flood-color="#181428" flood-opacity="0.32"/>
    </filter>

    <!-- reusable tile background -->
    <rect id="tileBg" x="0" y="0" width="78" height="78" rx="20" fill="#18181b"/>

    <!-- wire paths (also used as motion paths for the dots) -->
    <path id="p1" d="M329 170 L444 170 C492 170 506 292 534 292"/>
    <path id="p2" d="M252 330 L534 330"/>
    <path id="p3" d="M334 490 L444 490 C492 490 506 368 534 368"/>
    <path id="p4" d="M706 292 C734 292 748 170 796 170 L876 170"/>
    <path id="p5" d="M706 330 L921 330"/>
    <path id="p6" d="M706 368 C734 368 748 490 796 490 L951 490"/>
  </defs>

  <!-- ===================== WIRES ===================== -->
  <g fill="none" stroke="#3f3f46" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <use xlink:href="#p1"/>
    <use xlink:href="#p2"/>
    <use xlink:href="#p3"/>
    <use xlink:href="#p4"/>
    <use xlink:href="#p5"/>
    <use xlink:href="#p6"/>
  </g>

  <!-- ===================== FLOWING DOTS ===================== -->
  <g fill="#a1a1aa">
    <!-- p1 -->
    <circle r="4"><animateMotion dur="2.30s" repeatCount="indefinite"><mpath xlink:href="#p1"/></animateMotion></circle>
    <circle r="4"><animateMotion dur="2.30s" begin="-1.15s" repeatCount="indefinite"><mpath xlink:href="#p1"/></animateMotion></circle>
    <!-- p2 -->
    <circle r="4"><animateMotion dur="2.35s" repeatCount="indefinite"><mpath xlink:href="#p2"/></animateMotion></circle>
    <circle r="4"><animateMotion dur="2.35s" begin="-1.18s" repeatCount="indefinite"><mpath xlink:href="#p2"/></animateMotion></circle>
    <!-- p3 -->
    <circle r="4"><animateMotion dur="2.25s" repeatCount="indefinite"><mpath xlink:href="#p3"/></animateMotion></circle>
    <circle r="4"><animateMotion dur="2.25s" begin="-1.12s" repeatCount="indefinite"><mpath xlink:href="#p3"/></animateMotion></circle>
    <!-- p4 -->
    <circle r="4"><animateMotion dur="2.00s" repeatCount="indefinite"><mpath xlink:href="#p4"/></animateMotion></circle>
    <circle r="4"><animateMotion dur="2.00s" begin="-1.00s" repeatCount="indefinite"><mpath xlink:href="#p4"/></animateMotion></circle>
    <!-- p5 -->
    <circle r="4"><animateMotion dur="1.80s" repeatCount="indefinite"><mpath xlink:href="#p5"/></animateMotion></circle>
    <circle r="4"><animateMotion dur="1.80s" begin="-0.90s" repeatCount="indefinite"><mpath xlink:href="#p5"/></animateMotion></circle>
    <!-- p6 -->
    <circle r="4"><animateMotion dur="2.65s" repeatCount="indefinite"><mpath xlink:href="#p6"/></animateMotion></circle>
    <circle r="4"><animateMotion dur="2.65s" begin="-1.32s" repeatCount="indefinite"><mpath xlink:href="#p6"/></animateMotion></circle>
  </g>

  <!-- ===================== LABELS ===================== -->
  <g fill="#e4e4e7" font-size="23" font-weight="500" letter-spacing="-0.015em">
    <!-- left -->
    <text x="158" y="170" dominant-baseline="middle">Webpages</text>
    <text x="158" y="330" dominant-baseline="middle">Notes</text>
    <text x="158" y="490" dominant-baseline="middle"><tspan x="158" dy="-7">Context from</tspan><tspan x="158" dy="26">AI Tools</tspan></text>
    <!-- right -->
    <text x="1082" y="170" text-anchor="end" dominant-baseline="middle">Coding agents</text>
    <text x="1082" y="330" text-anchor="end" dominant-baseline="middle">Openclaw</text>
    <text x="1082" y="490" text-anchor="end" dominant-baseline="middle">AI chats</text>
  </g>

  <!-- ===================== LEFT TILES ===================== -->
  <!-- Webpages -->
  <g transform="translate(63,131)">
    <use xlink:href="#tileBg" filter="url(#softShadow)"/>
    <g transform="translate(18,18) scale(1.75)" stroke="#fff" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4.5" width="18" height="15" rx="2.5"/>
      <line x1="3" y1="9" x2="21" y2="9"/>
      <circle cx="6" cy="6.75" r="0.7" fill="#fff" stroke="none"/>
      <circle cx="8.6" cy="6.75" r="0.7" fill="#fff" stroke="none"/>
      <circle cx="11.2" cy="6.75" r="0.7" fill="#fff" stroke="none"/>
    </g>
  </g>
  <!-- Notes -->
  <g transform="translate(63,291)">
    <use xlink:href="#tileBg" filter="url(#softShadow)"/>
    <g transform="translate(18,18) scale(1.75)" stroke="#fff" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 3.6 H16 L19.4 7 V20.4 H5 Z"/>
      <path d="M15.8 3.7 V7.2 H19.3"/>
      <line x1="8" y1="11" x2="16" y2="11"/>
      <line x1="8" y1="14.4" x2="16" y2="14.4"/>
      <line x1="8" y1="17.8" x2="13" y2="17.8"/>
    </g>
  </g>
  <!-- Context from AI Tools -->
  <g transform="translate(63,451)">
    <use xlink:href="#tileBg" filter="url(#softShadow)"/>
    <g transform="translate(18,18) scale(1.75)" fill="#fff" stroke="none">
      <path d="M12 2 C12.9 7.6 16.4 11.1 22 12 C16.4 12.9 12.9 16.4 12 22 C11.1 16.4 7.6 12.9 2 12 C7.6 11.1 11.1 7.6 12 2 Z"/>
    </g>
  </g>

  <!-- ===================== RIGHT TILES ===================== -->
  <!-- Coding agents -->
  <g transform="translate(1099,131)">
    <use xlink:href="#tileBg" filter="url(#softShadow)"/>
    <g transform="translate(18,18) scale(1.75)" stroke="#fff" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M8.5 8 L5 12 L8.5 16"/>
      <path d="M15.5 8 L19 12 L15.5 16"/>
      <line x1="13.6" y1="6.5" x2="10.4" y2="17.5"/>
    </g>
  </g>
  <!-- Openclaw -->
  <g transform="translate(1099,291)">
    <use xlink:href="#tileBg" filter="url(#softShadow)"/>
    <g transform="translate(18,18) scale(1.75)" stroke="#fff" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3.5" y="5" width="17" height="14" rx="2.4"/>
      <path d="M7.5 10 L10.5 12.5 L7.5 15"/>
      <line x1="12.5" y1="15" x2="16.5" y2="15"/>
    </g>
  </g>
  <!-- AI chats -->
  <g transform="translate(1099,451)">
    <use xlink:href="#tileBg" filter="url(#softShadow)"/>
    <g transform="translate(18,18) scale(1.75)" stroke="#fff" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M5 5.5 H19 A1.6 1.6 0 0 1 20.6 7.1 V14.9 A1.6 1.6 0 0 1 19 16.5 H11.5 L7 19.6 V16.5 H5 A1.6 1.6 0 0 1 3.4 14.9 V7.1 A1.6 1.6 0 0 1 5 5.5 Z"/>
      <circle cx="9" cy="11" r="1" fill="#fff" stroke="none"/>
      <circle cx="12" cy="11" r="1" fill="#fff" stroke="none"/>
      <circle cx="15" cy="11" r="1" fill="#fff" stroke="none"/>
    </g>
  </g>

  <!-- ===================== CENTER BRAIN ===================== -->
  <g transform="translate(531,241)">
    <rect x="0" y="0" width="178" height="178" rx="42" fill="#18181b" filter="url(#softShadow)"/>
    <g transform="translate(29,29) scale(5)" stroke="#fff" fill="none" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 5a3 3 0 1 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 12 18Z"/>
      <path d="M12 5a3 3 0 1 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 12 18Z"/>
      <path d="M15 13a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/>
      <path d="M17.599 6.5a3 3 0 0 0 .399-1.375"/>
      <path d="M6.003 5.125A3 3 0 0 0 6.401 6.5"/>
      <path d="M3.477 10.896a4 4 0 0 1 .585-.396"/>
      <path d="M19.938 10.5a4 4 0 0 1 .585.396"/>
      <path d="M6 18a4 4 0 0 1-1.967-.516"/>
      <path d="M19.967 17.484A4 4 0 0 1 18 18"/>
    </g>
  </g>

</svg>
